
networks:
  fee-menouf-network:
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_node_modules:
    driver: local

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  postgres:
    <<: *default-restart
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: fee-menouf-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:?error}
      POSTGRES_USER: ${DB_USER:?error}
      POSTGRES_PASSWORD: ${DB_PASS:?error}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?error} -d ${DB_NAME:?error}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  redis:
    <<: *default-restart
    image: redis:7.4-alpine
    container_name: fee-menouf-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error}
    volumes:
      - redis_data:/data
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?error}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *default-logging

  minio:
    <<: *default-restart
    image: minio/minio:latest
    container_name: fee-menouf-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
      MINIO_DOMAIN: localhost
    volumes:
      - minio_data:/data
    networks:
      - fee-menouf-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  backend:
    <<: *default-restart
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fee-menouf-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_SYNCHRONIZE: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      DB_DATABASE: ${DB_NAME}
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    volumes:
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  frontend:
    <<: *default-restart
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8888/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8888/ws
    container_name: fee-menouf-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  ai-engine:
    <<: *default-restart
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: fee-menouf-ai-engine
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  nginx:
    <<: *default-restart
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.local
    container_name: fee-menouf-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"

    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
