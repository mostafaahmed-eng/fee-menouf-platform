user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
worker_rlimit_nofile 65535;

events {
    multi_accept on;
    use epoll;
    worker_connections 4096;
}

http {
    # ------------------------------------------------------------------
    # BASIC SETTINGS
    # ------------------------------------------------------------------
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ------------------------------------------------------------------
    # MIME TYPES
    # ------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ------------------------------------------------------------------
    # LOGGING
    # ------------------------------------------------------------------
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m gzip=9;
    error_log /var/log/nginx/error.log warn;

    # ------------------------------------------------------------------
    # RATE LIMITING
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_conn_zone $server_name zone=conn_per_server:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # ------------------------------------------------------------------
    # GZIP COMPRESSION
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.api+json
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/x-cross-domain-policy
        text/xml;

    # ------------------------------------------------------------------
    # PROXY SETTINGS
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Request-Id $request_id;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;

    # ------------------------------------------------------------------
    # WEBSOCKET SUPPORT
    # ------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # ------------------------------------------------------------------
    # UPSTREAM SERVICES
    # ------------------------------------------------------------------
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 64;
    }

    upstream backend_upstream {
        server backend:4000;
        keepalive 64;
    }

    upstream ai_engine_upstream {
        server ai-engine:8000;
        keepalive 32;
    }

    # ------------------------------------------------------------------
    # SSL CONFIGURATION (placeholders)
    # ------------------------------------------------------------------
    # Place your certificates in /etc/nginx/ssl/
    #   ssl/fullchain.pem
    #   ssl/privkey.pem
    #
    # For Let's Encrypt / Certbot:
    #   certbot certonly --webroot -w /usr/share/nginx/html -d your-domain.com

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Modern configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ------------------------------------------------------------------
    # SECURITY HEADERS (default map)
    # ------------------------------------------------------------------
    map $sent_http_content_type $csp {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'";
    }

    # ------------------------------------------------------------------
    # SERVER: HTTP redirect → HTTPS
    # ------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------------
    # SERVER: HTTPS (Main)
    # ------------------------------------------------------------------
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # ---- Security Headers ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy $csp always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Request-Id $request_id always;

        # ---- Cache static assets ----
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---- Cache fonts ----
        location ~* \.(woff2?|eot|ttf|otf)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---- Frontend (Next.js) ----
        location / {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn_per_ip 20;

            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;

            sub_filter_types text/html;
            sub_filter_once off;
        }

        # ---- Static assets ----
        location /_next/static {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 365d;
            add_header Cache-Control "public, immutable, no-transform";
            access_log off;
        }

        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        location /favicon.ico {
            alias /usr/share/nginx/html/favicon.ico;
            access_log off;
            expires 30d;
        }

        location /robots.txt {
            alias /usr/share/nginx/html/robots.txt;
            access_log off;
        }

        # ---- Backend API ----
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn conn_per_ip 10;

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ---- Auth endpoints (stricter rate limit) ----
        location ~ ^/api/(auth|login|register|forgot-password|reset-password) {
            limit_req zone=login burst=5 nodelay;
            limit_conn conn_per_ip 3;

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ---- WebSocket support for backend ----
        location /ws/ {
            limit_req zone=api burst=10;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ---- AI Engine ----
        location /ai/ {
            limit_req zone=ai burst=5 nodelay;
            limit_conn conn_per_ip 5;

            proxy_pass http://ai_engine_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 15s;
        }

        # ---- File uploads (MinIO S3 proxy) ----
        location /uploads/ {
            limit_req zone=upload burst=3 nodelay;
            limit_conn conn_per_ip 2;
            client_max_body_size 50M;
            client_body_timeout 120s;

            proxy_pass http://minio:9000/;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ---- Deny access to hidden files ----
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # ---- Deny access to sensitive paths ----
        location ~ (\.env|\.git|composer\.json|package\.json|yarn\.lock|Dockerfile) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # ---- Error pages ----
        error_page 400 401 403 404 /errors/404.html;
        error_page 429 /errors/429.html;
        error_page 500 502 503 504 /errors/50x.html;

        location /errors/ {
            internal;
            root /usr/share/nginx/html;
        }
    }

    # ------------------------------------------------------------------
    # SERVER: API subdomain
    # ------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Request-Id $request_id always;

        location / {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
