user nginx;
worker_processes auto;
pid /tmp/nginx.pid;
worker_rlimit_nofile 65535;

events {
    multi_accept on;
    use epoll;
    worker_connections 4096;
}

http {
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log combined buffer=512k flush=1m gzip=9;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=login:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=frontend:10m rate=2000r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_conn_zone $server_name zone=conn_per_server:10m;
    limit_req_status 429;
    limit_conn_status 429;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.api+json
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/x-cross-domain-policy
        text/xml;

    proxy_http_version 1.1;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Request-Id $request_id;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    map $sent_http_content_type $csp {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:* https: wss:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'";
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy $csp always;
        add_header X-Request-Id $request_id always;

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(woff2?|eot|ttf|otf)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            limit_req zone=frontend burst=100 nodelay;
            limit_conn conn_per_ip 100;

            set $frontend "http://frontend:3000";
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        location ^~ /_next/static/ {
            proxy_pass http://frontend:3000/_next/static/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ^~ /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        location ^~ /favicon.ico {
            alias /usr/share/nginx/html/favicon.ico;
            access_log off;
            expires 30d;
        }

        location ^~ /robots.txt {
            alias /usr/share/nginx/html/robots.txt;
            access_log off;
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn conn_per_ip 10;

            set $backend "http://backend:4000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;
        }

        location ~ ^/api/(auth|login|register|forgot-password|reset-password) {
            limit_req zone=login burst=5 nodelay;
            limit_conn conn_per_ip 3;

            set $backend "http://backend:4000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /ws/ {
            limit_req zone=api burst=10;
            set $backend "http://backend:4000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /ai/ {
            limit_req zone=ai burst=5 nodelay;
            limit_conn conn_per_ip 5;

            rewrite ^/ai(/.*)$ $1 break;
            proxy_pass http://ai-engine:8000;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 15s;
        }

        location /uploads/ {
            limit_req zone=upload burst=3 nodelay;
            limit_conn conn_per_ip 2;
            client_max_body_size 50M;
            client_body_timeout 120s;

            set $minio "http://minio:9000";
            proxy_pass $minio;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        location ~ (\.env|\.git|composer\.json|package\.json|yarn\.lock|Dockerfile) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        error_page 400 401 403 404 /404.html;
    }
}
