groups:
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 30 seconds."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="backend", status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total{job="backend"}[5m])) by (job)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is above 5% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "P95 response time is above 2 seconds for 5 minutes (current: {{ $value | humanizeDuration }})."

  - name: infrastructure
    interval: 30s
    rules:
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count{datname="fee_menouf"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection count"
          description: "PostgreSQL active connections exceeded 80 for 5 minutes (current: {{ $value }})."

      - alert: DatabaseConnectionsCritical
        expr: pg_stat_activity_count{datname="fee_menouf"} > 150
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical database connection count"
          description: "PostgreSQL active connections exceeded 150 for 2 minutes (current: {{ $value }})."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is above 80% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: RedisMemoryCritical
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis memory usage is critical"
          description: "Redis memory usage is above 95% for 2 minutes (current: {{ $value | humanizePercentage }})."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Less than 20% disk space available (current: {{ $value | humanizePercentage }})."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space"
          description: "Less than 10% disk space available (current: {{ $value | humanizePercentage }})."

      - alert: MemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: ContainerRestart
        expr: increase(container_restart_count[10m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarted {{ $value }} times"
          description: "Container has restarted more than 3 times in the last 10 minutes."

  - name: ai_engine
    interval: 30s
    rules:
      - alert: AIEngineHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="ai-engine"}[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI Engine high latency"
          description: "AI Engine P95 response time is above 5 seconds for 5 minutes (current: {{ $value | humanizeDuration }})."

      - alert: AIEngineHighInferenceLatency
        expr: |
          histogram_quantile(0.95, sum(rate(ai_inference_duration_seconds_bucket[5m])) by (le)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI Engine inference latency is high"
          description: "AI inference P95 latency exceeded 10 seconds for 5 minutes (current: {{ $value | humanizeDuration }})."

  - name: frontend
    interval: 30s
    rules:
      - alert: FrontendHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="frontend", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="frontend"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Frontend high error rate"
          description: "Frontend error rate is above 5% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: FrontendBuildFailure
        expr: nextjs_build_info == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Frontend build failure detected"
          description: "Next.js build info indicates a failed build state."
