apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: fee-menouf-platform
    app.kubernetes.io/component: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
      app.kubernetes.io/part-of: fee-menouf-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: fee-menouf-platform
        app.kubernetes.io/component: proxy
    spec:
      serviceAccountName: nginx-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        runAsGroup: 101
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "nginx -s quit; sleep 5"
      terminationGracePeriodSeconds: 30
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: fee-menouf-platform
data:
  nginx.conf: |
    worker_processes auto;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        charset utf-8;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        server_tokens off;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_min_length 256;
        gzip_types application/json application/javascript text/css text/plain text/xml;

        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ""      close;
        }

        upstream frontend_upstream {
            server frontend-service:3000;
            keepalive 32;
        }

        upstream backend_upstream {
            server backend-service:4000;
            keepalive 32;
        }

        upstream ai_engine_upstream {
            server ai-engine-service:8000;
            keepalive 16;
        }

        upstream minio_upstream {
            server minio-service:9000;
            keepalive 16;
        }

        server {
            listen 80;
            server_name _;

            client_max_body_size 50M;

            location / {
                proxy_pass http://frontend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /api/ {
                proxy_pass http://backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_read_timeout 120s;
            }

            location /ws/ {
                proxy_pass http://backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
            }

            location /ai/ {
                proxy_pass http://ai_engine_upstream;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "";
                proxy_read_timeout 300s;
            }

            location /uploads/ {
                proxy_pass http://minio_upstream/;
                proxy_http_version 1.1;
                proxy_set_header Host minio-service:9000;
                client_max_body_size 50M;
                client_body_timeout 120s;
            }

            location ~ /\.(?!well-known) {
                deny all;
                return 404;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: fee-menouf-platform
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: fee-menouf-platform
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fee-menouf-ingress
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: fee-menouf-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: fee-menouf.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
