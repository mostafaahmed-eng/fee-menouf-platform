apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fee-menouf-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["fee-menouf-secrets"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
    resourceNames: ["fee-menouf-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: fee-menouf-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
    resourceNames: ["fee-menouf-config"]
---
