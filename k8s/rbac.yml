---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fee-menouf-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-role
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: fee-menouf
