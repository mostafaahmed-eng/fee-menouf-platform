apiVersion: v1
kind: ConfigMap
metadata:
  name: fee-menouf-config
  namespace: fee-menouf
  labels:
    app.kubernetes.io/part-of: fee-menouf-platform
data:
  NODE_ENV: "production"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "fee_menouf_platform"
  DB_USER: "postgres"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "minio-service"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  NEXT_PUBLIC_API_URL: "http://localhost/api/v1"
  NEXT_PUBLIC_WS_URL: "ws://localhost/ws"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  CORS_ORIGINS: "http://localhost"
  JWT_ACCESS_EXPIRATION: "15m"
  JWT_REFRESH_EXPIRATION: "7d"
  JWT_ISSUER: "fee-menouf-university"
  JWT_AUDIENCE: "fee-menouf-platform"
  ENCRYPTION_IV_PREFIX: "feemenouf2026"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  UPLOAD_MAX_FILE_SIZE_MB: "50"
  UPLOAD_ALLOWED_EXTENSIONS: "jpg,jpeg,png,gif,pdf,doc,docx,xlsx,pptx,mp4,webm"
  UPLOAD_PATH: "uploads"
  CACHE_TTL_MS: "300000"
  CACHE_ENABLED: "true"
  BCRYPT_SALT_ROUNDS: "12"
  HELMET_ENABLED: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  AI_ENGINE_WORKERS: "4"
  AI_ENGINE_MAX_CONCURRENT: "10"
