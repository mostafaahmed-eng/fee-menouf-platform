apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: fee-menouf-platform
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: fee-menouf-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: fee-menouf-platform
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: postgres-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        runAsGroup: 999
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "fee_menouf_platform"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: DB_PASS
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "scram-sha-256"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - fee_menouf_platform
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - fee_menouf_platform
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - fee_menouf_platform
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: postgres
          app.kubernetes.io/part-of: fee-menouf-platform
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: ""
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: fee-menouf-platform
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: fee-menouf-platform
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
