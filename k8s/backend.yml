apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fee-menouf-platform
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: fee-menouf-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: fee-menouf-platform
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        runAsGroup: 1000
      containers:
        - name: backend
          image: fee-menouf/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fee-menouf-config
          env:
            - name: PORT
              value: "4000"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: DB_PASS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: REDIS_PASSWORD
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: JWT_REFRESH_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: ENCRYPTION_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: SESSION_SECRET
            - name: CSRF_SECRET
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: CSRF_SECRET
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: fee-menouf-secrets
                  key: SMTP_PASS
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 10"
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: fee-menouf
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fee-menouf-platform
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fee-menouf-platform
  ports:
    - name: http
      port: 4000
      targetPort: http
      protocol: TCP
