networks:
  fee-menouf-network:
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_node_modules:
    driver: local
  chromadb_data:
    driver: local

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true

x-restart: &default-restart
  restart: always

x-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "1"
        memory: "512M"
      reservations:
        cpus: "0.25"
        memory: "128M"

services:
  postgres:
    <<: [*default-restart, *default-security]
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: fee-menouf-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:?error}
      POSTGRES_USER: ${DB_USER:?error}
      POSTGRES_PASSWORD: ${DB_PASS:?error}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?error} -d ${DB_NAME:?error}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "256M"

  redis:
    <<: [*default-restart, *default-security]
    image: redis:7.4-alpine
    container_name: fee-menouf-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error}
    volumes:
      - redis_data:/data
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?error}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
        reservations:
          cpus: "0.1"
          memory: "64M"

  minio:
    <<: [*default-restart, *default-security]
    image: minio/minio:latest
    container_name: fee-menouf-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
      MINIO_DOMAIN: storage.your-domain.com
    volumes:
      - minio_data:/data
    networks:
      - fee-menouf-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512M"
        reservations:
          cpus: "0.2"
          memory: "128M"

  backend:
    <<: [*default-restart, *default-security]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fee-menouf-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    # SECURITY NOTE: env_file exposes ALL 60+ .env vars to this container.
    # In production, use explicit environment entries instead of env_file.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_PASSWORD: ${DB_PASS}
      DB_USERNAME: ${DB_USER}
      DB_DATABASE: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    volumes:
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "256M"

  frontend:
    <<: [*default-restart, *default-security]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.your-domain.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.your-domain.com}
    container_name: fee-menouf-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    # SECURITY NOTE: env_file exposes ALL 60+ .env vars to this container.
    # In production, use explicit environment entries instead of env_file.
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512M"
        reservations:
          cpus: "0.3"
          memory: "128M"

  ai-engine:
    <<: [*default-restart, *default-security]
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: fee-menouf-ai-engine
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    # SECURITY NOTE: env_file exposes ALL 60+ .env vars to this container.
    # In production, use explicit environment entries instead of env_file.
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - chromadb_data:/app/data/chromadb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "1G"

  nginx:
    <<: [*default-restart, *default-security]
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.local
    container_name: fee-menouf-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    networks:
      - fee-menouf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"
        reservations:
          cpus: "0.1"
          memory: "64M"
